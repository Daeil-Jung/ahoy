name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - feat/**
      - fix/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Run test suite
        run: uv run --no-project --with pytest --with pytest-cov pytest
